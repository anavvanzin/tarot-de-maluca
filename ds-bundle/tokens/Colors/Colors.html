<!-- @dsCard group="Foundations" subtitle="Obsidian & gold-foil palette (8 tokens)" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{background:var(--color-velvet);min-height:100vh;padding:2.5rem;display:flex;align-items:center;justify-content:center}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;width:100%;max-width:680px}
  .swatch{border:1px solid var(--color-gold-dark);border-radius:6px;overflow:hidden;font-family:var(--font-heading);color:var(--color-paper)}
  .chip{height:74px}
  .meta{padding:.5rem .6rem;background:rgba(0,0,0,.35);font-size:.72rem;letter-spacing:.5px}
  .meta b{display:block;color:var(--color-gold);font-size:.8rem;margin-bottom:.15rem}
</style>
</head>
<body>
<div class="grid">
  <div class="swatch"><div class="chip" style="background:var(--color-velvet)"></div><div class="meta"><b>velvet</b>#08060c</div></div>
  <div class="swatch"><div class="chip" style="background:var(--color-obsidian)"></div><div class="meta"><b>obsidian</b>#121017</div></div>
  <div class="swatch"><div class="chip" style="background:var(--color-ink)"></div><div class="meta"><b>ink</b>#110e13</div></div>
  <div class="swatch"><div class="chip" style="background:var(--color-gold)"></div><div class="meta"><b>gold</b>#d9b461</div></div>
  <div class="swatch"><div class="chip" style="background:var(--color-gold-dark)"></div><div class="meta"><b>gold-dark</b>#8c6a23</div></div>
  <div class="swatch"><div class="chip" style="background:var(--color-crimson)"></div><div class="meta"><b>crimson</b>#a62424</div></div>
  <div class="swatch"><div class="chip" style="background:var(--color-paper)"></div><div class="meta"><b>paper</b>#f5f2eb</div></div>
  <div class="swatch"><div class="chip" style="background:var(--color-paper-dark)"></div><div class="meta"><b>paper-dark</b>#e8e3d5</div></div>
</div>
</body>
</html>
