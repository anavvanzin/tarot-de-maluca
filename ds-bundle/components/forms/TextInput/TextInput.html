<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>body{background:var(--color-velvet);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.lobby-form{width:340px}</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs>
  <filter id="woodcut-roughness" x="-20%" y="-20%" width="140%" height="140%">

    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<form class="lobby-form">
  <div class="input-group">
    <input type="text" placeholder="Nome da jogadora..." value="Andressa">
  </div>
  <div class="input-group">
    <input type="text" placeholder="Nome da jogadora...">
  </div>
</form>
</body>
</html>
