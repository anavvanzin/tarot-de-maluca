<!-- @dsCard group="Game" subtitle="Final-standings row with pure/doomed badges" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>body{background:var(--color-velvet);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.standings-box{width:380px}</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs>
  <filter id="woodcut-roughness" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<div class="standings-box">
  <h3 class="section-title">Julgamento Final</h3>
  <div class="rankings-list">
    <div class="ranking-item">
      <span class="ranking-player-name">🐕 Andressa <span class="ranking-title-badge pure">A Alma Mais Pura</span></span>
      <span class="ranking-lives-info">3 🍷</span>
    </div>
    <div class="ranking-item">
      <span class="ranking-player-name">🐈 Sabrina</span>
      <span class="ranking-lives-info">1 🍷</span>
    </div>
    <div class="ranking-item">
      <span class="ranking-player-name">🐈 Patrícia <span class="ranking-title-badge doomed">A Condenada</span></span>
      <span class="ranking-lives-info">0 🍷</span>
    </div>
  </div>
</div>
</body>
</html>
