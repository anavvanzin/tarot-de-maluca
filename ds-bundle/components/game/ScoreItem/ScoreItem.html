<!-- @dsCard group="Game" subtitle="Scoreboard tile with essence chalices" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>body{background:var(--color-velvet);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.game-scoreboard{width:360px}</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs>
  <filter id="woodcut-roughness" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<div class="game-scoreboard">
  <h4 class="scoreboard-title">Cálices de Essência</h4>
  <div class="scoreboard-grid">
    <div class="score-item active-turn">
      <span class="score-name">🐕 Andressa</span>
      <span class="score-lives"><span class="chalice-icon">🍷</span><span class="chalice-icon">🍷</span><span class="chalice-icon">🍷</span></span>
    </div>
    <div class="score-item">
      <span class="score-name">🐈 Sabrina</span>
      <span class="score-lives"><span class="chalice-icon">🍷</span><span class="chalice-icon">🍷</span><span class="chalice-icon lost">🍷</span></span>
    </div>
  </div>
</div>
</body>
</html>
