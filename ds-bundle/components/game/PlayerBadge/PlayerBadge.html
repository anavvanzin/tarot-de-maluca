<!-- @dsCard group="Game" subtitle="Summoned-player chip with remove control" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>body{background:var(--color-velvet);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs>
  <filter id="woodcut-roughness" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<ul class="players-list-badge">
  <li class="player-badge"><span class="player-icon">🐕</span> Andressa <button class="remove-player-btn" aria-label="Remover">×</button></li>
  <li class="player-badge"><span class="player-icon">🐈</span> Sabrina <button class="remove-player-btn" aria-label="Remover">×</button></li>
  <li class="player-badge"><span class="player-icon">🐕</span> Shai <button class="remove-player-btn" aria-label="Remover">×</button></li>
</ul>
</body>
</html>
