<!-- @dsCard group="Cards" subtitle="Stacked draw deck with depth layers" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>body{background:var(--color-velvet);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}</style>
</head>
<body>
<div class="deck-area">
  <div class="deck-container">
    <div class="card-deck-visual" role="button" aria-label="Tirar uma carta">
      <div class="deck-card-layer layer-1"></div>
      <div class="deck-card-layer layer-2"></div>
      <div class="deck-card-layer layer-3"></div>
      <div class="deck-card-layer top-card">
        <div class="deck-back-art"></div>
        <div class="deck-prompt-text">Toque para Tirar</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
