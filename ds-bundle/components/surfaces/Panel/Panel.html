<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>body{background:var(--color-velvet);display:flex;flex-direction:column;gap:1.4rem;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.col{width:420px;display:flex;flex-direction:column;gap:1.4rem}</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs>
  <filter id="woodcut-roughness" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<div class="col">
  <div class="intro-box">
    <p class="intro-text">Bem-vindas à mesa do destino. Digitem seus nomes para sentarem-se em círculo.</p>
  </div>

  <div class="standings-box">
    <h3 class="section-title">Julgamento Final</h3>
    <p class="intro-text center">As verdades foram expostas sob a luz das cartas.</p>
  </div>
</div>
</body>
</html>
