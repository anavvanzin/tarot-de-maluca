<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>body{background:var(--color-velvet);display:flex;gap:1.2rem;align-items:center;justify-content:center;min-height:100vh;padding:2rem}</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs>
  <filter id="woodcut-roughness" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<button class="btn-icon" aria-label="Alternar som"><span>🔔</span></button>
<button class="btn-icon" aria-label="Fechar"><span>✦</span></button>
<button class="btn-icon" aria-label="Menu"><span>☾</span></button>
</body>
</html>
