<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>body{background:var(--color-velvet);display:flex;flex-direction:column;gap:1.4rem;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.row{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;justify-content:center}.stack{width:300px}</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs>
  <filter id="woodcut-roughness" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<div class="row">
  <button class="btn-mystic">Invocar</button>
  <button class="btn-mystic" disabled>Bloqueado</button>
</div>
<div class="stack">
  <button class="btn-mystic btn-large">Iniciar a Leitura</button>
</div>
</body>
</html>
